<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Serkonia</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111827;
      color: #f9fafb;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .box {
      padding: 40px;
      border-radius: 16px;
      background: #1f2937;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      max-width: 700px;
    }

    h1 {
      margin-top: 0;
      font-size: 48px;
    }

    p {
      font-size: 20px;
      color: #d1d5db;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Serkonia</h1>
    <p>Сайт мира загружен и работает.</p>
    <p>Дальше сюда добавим интерактивную карту и таймлайн.</p>
  </div>
</body>
</html>
